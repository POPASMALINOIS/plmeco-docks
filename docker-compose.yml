version: "3.9"

services:
  backend:
    build:
      context: ./backend
    image: plmeco-sync-backend:latest
    container_name: plmeco-backend
    restart: unless-stopped
    environment:
      - PORT=4000
      - TOKEN=${TOKEN}          # define TOKEN en un .env del compose (no confundir con backend/.env)
      - CORS_ORIGIN=*
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: plmeco-frontend:latest
    container_name: plmeco-frontend
    restart: unless-stopped
    environment:
      # Estas dos variables solo afectan si tu app las lee en runtime (en este setup se inyectan en build)
      - VITE_BACKEND_URL=http://localhost:4000
      - VITE_BACKEND_TOKEN=${TOKEN}
    ports:
      - "8080:80"
    depends_on:
      - backend
